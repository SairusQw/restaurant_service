{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold m-0">Dish Categories</h2>
    <a href="{% url 'restourant:dish-type-create' %}" class="btn btn-dark rounded-pill shadow-sm">
        <i class="fas fa-folder-plus me-1"></i> New Category
    </a>
</div>

<div class="row">
    {% for type in dish_type_list %}
    <div class="col-md-4 mb-4">
        <div class="card border-0 shadow-sm h-100 transition-hover">
            <div class="card-body d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-soft-primary text-primary rounded p-2 me-3" style="background: #e7f1ff;">
                        <i class="fas fa-tag"></i>
                    </div>
                    <span class="h5 mb-0 fw-bold">{{ type.name }}</span>
                </div>

                <div class="actions">
                    <a href="{% url 'restourant:dish-type-update' pk=type.id %}" class="text-primary me-2">
                        <i class="fas fa-pen-to-square"></i>
                    </a>
                    <a href="{% url 'restourant:dish-type-delete' pk=type.id %}" class="text-danger">
                        <i class="fas fa-trash-can"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12">
        <p class="text-muted text-center">No categories available.</p>
    </div>
    {% endfor %}
</div>
{% include "includes/pagination.html" %}
{% endblock %}
