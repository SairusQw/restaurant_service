{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg text-center p-5">
            <i class="fas fa-exclamation-triangle fa-4x text-danger mb-4"></i>
            <h3 class="fw-bold">Are you sure?</h3>
            <p class="text-muted mb-4">Do you really want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
            <form action="" method="post">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger btn-lg rounded-pill shadow-sm">Yes, Delete</button>
                    <a href="javascript:history.back()" class="btn btn-light btn-lg rounded-pill">No, Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
