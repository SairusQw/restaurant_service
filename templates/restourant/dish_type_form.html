{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card border-0 shadow-lg p-4 p-md-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold">
            {% if object %}
              Edit {{ object }}
            {% else %}
              Create New Item
            {% endif %}
          </h2>
          <p class="text-muted">Write the name of the new dish type</p>
        </div>
        <form action="" method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Save Data</button>
            <a href="javascript:history.back()" class="btn btn-link text-muted">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
