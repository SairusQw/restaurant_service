{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <title>{% block title %}Restaurant Service{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<script>
    // Автоматичне закриття повідомлень через 4 секунди
    setTimeout(function () {
        let alerts = document.querySelectorAll('.alert');
        alerts.forEach(function (alert) {
            let bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 3500);
</script>
<body>
<div class="container-fluid">
  <div class="row">

    {% include "includes/navbar.html" %}

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 pt-5">

      {% if messages %}
        <div class="messages-container">
          {% for message in messages %}
            <div
                class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm border-0 rounded-pill px-4 mb-4"
                role="alert">
              {% if message.tags == "success" %}
                <i class="fas fa-check-circle me-2"></i>
              {% else %}
                <i class="fas fa-info-circle me-2"></i>
              {% endif %}

              {{ message }}

              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
